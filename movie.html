<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chelix - Detalle</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>
<body class="movie-page">
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer;">CHELIX</div>
    </nav>

    <div class="movie-detail-container">
        <button class="btn btn-back" onclick="window.location.href='index.html'">← Volver a Inicio</button>
        
        <div class="movie-info-box">
            <div class="movie-poster-large" id="moviePoster">
                <h2 id="movieTitleImg">Cargando...</h2>
            </div>
            <div class="movie-description">
                <h1 id="movieTitle">Cargando...</h1>
                <div class="meta">
                    <span class="match">98% de coincidencia</span>
                    <span class="year">2024</span>
                    <span class="age">+13</span>
                </div>
                <p id="movieSynopsis">Cargando sinopsis...</p>
                <div class="actions">
                    <button class="btn btn-primary">▶ Reproducir</button>
                    <button class="btn btn-secondary">+ Mi Lista</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        window.onload = loadMovieDetails;
    </script>
</body>
</html>
